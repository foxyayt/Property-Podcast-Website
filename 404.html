<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Redirecting...</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        h1 { color: hsl(85, 55%, 55%); margin-bottom: 1rem; }
        p { color: #999; margin-bottom: 2rem; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(122, 201, 67, 0.1);
            border-left-color: hsl(85, 55%, 55%);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        var path = window.location.pathname;
        if (path.endsWith('.html')) {
            window.location.replace(path.replace('.html', '/'));
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>404 - Page Not Found</h1>
        <p>We're looking for that page. If it's an old link, we'll redirect you shortly.</p>
        <div class="spinner"></div>
        <p style="margin-top: 2rem;"><a href="/" style="color: hsl(85, 55%, 55%); text-decoration: none;">Go back home</a></p>
    </div>
</body>
</html>
